<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy & Production Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f5f7fa;margin:0}
.container{padding:20px}

/* Controls */
.controls{
display:flex;gap:10px;background:#fff;padding:15px;
border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.08)
}

/* KPI */
.kpis{
display:grid;grid-template-columns:repeat(5,1fr);
gap:16px;margin-top:20px
}
.kpi-card{
background:#fff;border-radius:14px;padding:16px;
box-shadow:0 6px 14px rgba(0,0,0,.08)
}
.kpi-header{font-size:13px;color:#666;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700}
.kpi-sub{font-size:13px;color:#777}

/* Charts */
.row{
display:grid;grid-template-columns:1fr 1fr;
gap:20px;margin-top:20px
}
.chart-card{
background:#fff;padding:15px;border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08)
}
.chart-title{font-weight:600;margin-bottom:10px}

/* Phase */
.phase-title{margin-top:20px;font-weight:600}
.phase{
display:grid;grid-template-columns:1fr 1fr 1fr;
gap:15px;margin-top:10px
}
.phase-card{
padding:15px;border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08)
}
.phaseR{background:#fde2e2}
.phaseY{background:#fff6d6}
.phaseB{background:#e2ecff}

/* Bars */
.bar{height:6px;background:#ddd;border-radius:6px;margin:6px 0}
.fill{height:100%;border-radius:6px}
.red{background:#ef4444}
.yellow{background:#f59e0b}
.blue{background:#3b82f6}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:center}
th{background:#f3f4f6}

</style>
</head>

<body>
<div class="container">

<!-- Controls -->
<div class="controls">
<input type="date" id="dateInput">
<button onclick="generate()">Generate</button>
</div>

<!-- KPI -->
<div class="kpis">
<div class="kpi-card">
<div class="kpi-header">Total Energy</div>
<div id="kpiEnergy" class="kpi-value">-</div>
<div class="kpi-sub">kWh</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Avg Power</div>
<div id="kpiAvgPower" class="kpi-value">-</div>
<div class="kpi-sub">kW</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Max Power</div>
<div id="kpiMaxPower" class="kpi-value">-</div>
<div class="kpi-sub">kW</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Avg PF</div>
<div id="kpiAvgPF" class="kpi-value">-</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Min PF</div>
<div id="kpiMinPF" class="kpi-value">-</div>
</div>
</div>

<!-- Charts -->
<div class="row">
<div class="chart-card">
<div class="chart-title">Hourly Energy vs Production</div>
<div id="energyChart"></div>
</div>

<div class="chart-card">
<div class="chart-title">Power Demand & Power Factor Trend</div>
<div id="powerChart"></div>
</div>
</div>

<!-- Phase -->
<div class="phase-title">Phase-wise Electrical Analysis</div>
<div class="phase">
<div class="phase-card phaseR" id="phaseR"></div>
<div class="phase-card phaseY" id="phaseY"></div>
<div class="phase-card phaseB" id="phaseB"></div>
</div>

<!-- Table -->
<table>
<thead>
<tr>
<th>Time</th>
<th>Energy</th>
<th>Avg Power</th>
<th>PF</th>
<th>Production</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Active_Power","Power_Factor",
"Consumption_hourly","Production_hourly",
"Today_Consumption",
"R_Voltage","Y_Voltage","B_Voltage",
"R_Phase_Current","Y_Phase_Current","B_Phase_Current",
"THD_VoltageR","THD_VoltageY","THD_VoltageB",
"THD_CurrentA","THD_CurrentB","THD_CurrentC"
];

function num(v){const n=Number(v);return Number.isFinite(n)?n:null;}

async function fetchData(start,end){
const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=50000&agg=NONE`;
const res=await fetch(url,{headers:{"X-Authorization":`Bearer ${TOKEN}`}});
return res.json();
}

function merge(data){
const map=new Map();
Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
const t=p.ts;
const row=map.get(t)||{ts:t};
row[k]=num(p.value);
map.set(t,row);
});
});
return [...map.values()].sort((a,b)=>a.ts-b.ts);
}

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function getLatest(rows,key){
const arr=rows.filter(r=>r[key]!=null).sort((a,b)=>b.ts-a.ts);
return arr.length?arr[0][key]:0;
}

/* KPI */
function generateKPIs(rows){
const power=rows.map(r=>r.Active_Power).filter(v=>v!=null);
const pf=rows.map(r=>r.Power_Factor).filter(v=>v!=null);

const energy=getLatest(rows,"Today_Consumption");

document.getElementById("kpiEnergy").innerText=energy.toFixed(2);
document.getElementById("kpiAvgPower").innerText=avg(power).toFixed(2);
document.getElementById("kpiMaxPower").innerText=power.length?Math.max(...power).toFixed(2):"0";
document.getElementById("kpiAvgPF").innerText=avg(pf).toFixed(2);
document.getElementById("kpiMinPF").innerText=pf.length?Math.min(...pf).toFixed(2):"0";
}

/* Hourly */
function groupHourly(rows){
const map=new Map();

rows.forEach(r=>{
const d=new Date(r.ts);
const h=new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime();

const obj=map.get(h)||{ts:h,energy:0,production:0,power:[],pf:[]};

if(r.Consumption_hourly!=null) obj.energy+=r.Consumption_hourly;
if(r.Production_hourly!=null) obj.production+=r.Production_hourly;
if(r.Active_Power!=null) obj.power.push(r.Active_Power);
if(r.Power_Factor!=null) obj.pf.push(r.Power_Factor);

map.set(h,obj);
});

return [...map.values()].map(h=>({
ts:h.ts,
energy:h.energy,
production:h.production,
avgPower:avg(h.power),
avgPF:avg(h.pf)
}));
}

/* Charts */
function charts(hourly){
const x=hourly.map(h=>new Date(h.ts));

Plotly.newPlot("energyChart",[
{ x:x,y:hourly.map(h=>h.energy),type:"bar",name:"Energy"},
{ x:x,y:hourly.map(h=>h.production),type:"scatter",name:"Production",yaxis:"y2"}
]);

Plotly.newPlot("powerChart",[
{ x:x,y:hourly.map(h=>h.avgPower),name:"kW",mode:"lines"},
{ x:x,y:hourly.map(h=>h.avgPF),name:"PF",mode:"lines",yaxis:"y2"}
]);
}

/* Table */
function table(hourly){
const tb=document.getElementById("tableBody");
tb.innerHTML="";
hourly.forEach(h=>{
const tr=document.createElement("tr");
[
new Date(h.ts).getHours()+":00",
h.energy.toFixed(2),
h.avgPower.toFixed(2),
h.avgPF.toFixed(2),
h.production.toFixed(0)
].forEach(v=>{
const td=document.createElement("td");
td.innerText=v;
tr.appendChild(td);
});
tb.appendChild(tr);
});
}

/* Phase */
function phase(rows){
function avgKey(k){return avg(rows.map(r=>r[k]).filter(v=>v!=null));}

function bar(v,max,color){
const p=Math.min((v/max)*100,100);
return `<div class="bar"><div class="fill ${color}" style="width:${p}%"></div></div>`;
}

document.getElementById("phaseR").innerHTML=`
<b>🔴 Phase R</b><br>
Voltage ${avgKey("R_Voltage").toFixed(1)} V ${bar(avgKey("R_Voltage"),250,"red")}
Current ${avgKey("R_Phase_Current").toFixed(1)} A ${bar(avgKey("R_Phase_Current"),100,"red")}
`;

document.getElementById("phaseY").innerHTML=`
<b>🟡 Phase Y</b><br>
Voltage ${avgKey("Y_Voltage").toFixed(1)} V ${bar(avgKey("Y_Voltage"),250,"yellow")}
Current ${avgKey("Y_Phase_Current").toFixed(1)} A ${bar(avgKey("Y_Phase_Current"),100,"yellow")}
`;

document.getElementById("phaseB").innerHTML=`
<b>🔵 Phase B</b><br>
Voltage ${avgKey("B_Voltage").toFixed(1)} V ${bar(avgKey("B_Voltage"),250,"blue")}
Current ${avgKey("B_Phase_Current").toFixed(1)} A ${bar(avgKey("B_Phase_Current"),100,"blue")}
`;
}

async function generate(){
const date=document.getElementById("dateInput").value;
if(!date){alert("Select date");return;}

const start=new Date(date+"T00:00:00").getTime();
const end=new Date(date+"T23:59:59").getTime();

const data=await fetchData(start,end);
const rows=merge(data);
const hourly=groupHourly(rows);

generateKPIs(rows);
charts(hourly);
table(hourly);
phase(rows);
}
</script>

</body>
</html>
