<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f5f7fa;margin:0}
.container{padding:20px}

/* Controls */
.controls{display:flex;gap:10px;background:#fff;padding:15px;border-radius:10px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:20px}
.kpi-card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.08)}
.kpi-value{font-size:24px;font-weight:700}

/* Charts */
.row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.chart-card{background:#fff;padding:15px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.chart-title{font-weight:600;margin-bottom:10px}

/* Phase Section */
.phase-title{margin-top:20px;font-weight:600}

.phase{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-top:10px;
}

.phase-card{
padding:15px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
color:#333;
}

/* Phase Colors */
.phaseR{background:#fde2e2}
.phaseY{background:#fff6d6}
.phaseB{background:#e2ecff}

/* Bars */
.bar{
height:6px;
border-radius:6px;
background:#ddd;
margin-top:6px;
overflow:hidden;
}
.fill{
height:100%;
border-radius:6px;
}

/* Colors */
.red{background:#ef4444}
.yellow{background:#f59e0b}
.blue{background:#3b82f6}

/* Status */
.normal{color:green;font-size:12px}
.warning{color:orange;font-size:12px}
</style>
</head>

<body>
<div class="container">

<!-- Controls -->
<div class="controls">
<input type="date" id="dateInput">
<button onclick="generate()">Generate</button>
</div>

<!-- Charts -->
<div class="row">
<div class="chart-card">
<div class="chart-title">Hourly Energy vs Production</div>
<div id="energyChart"></div>
</div>

<div class="chart-card">
<div class="chart-title">Power Demand & Power Factor Trend</div>
<div id="powerChart"></div>
</div>
</div>

<!-- Phase -->
<div class="phase-title">Phase-wise Electrical Analysis</div>

<div class="phase">
<div class="phase-card phaseR" id="phaseR"></div>
<div class="phase-card phaseY" id="phaseY"></div>
<div class="phase-card phaseB" id="phaseB"></div>
</div>

</div>

<script>
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Active_Power","Power_Factor",
"Consumption_hourly","Production_hourly",
"R_Voltage","Y_Voltage","B_Voltage",
"R_Phase_Current","Y_Phase_Current","B_Phase_Current",
"THD_VoltageR","THD_VoltageY","THD_VoltageB",
"THD_CurrentA","THD_CurrentB","THD_CurrentC"
];

function num(v){const n=Number(v);return Number.isFinite(n)?n:null;}

async function fetchData(start,end){
const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=50000&agg=NONE`;
const res=await fetch(url,{headers:{"X-Authorization":`Bearer ${TOKEN}`}});
return res.json();
}

function merge(data){
const map=new Map();
Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
const t=p.ts;
const row=map.get(t)||{ts:t};
row[k]=num(p.value);
map.set(t,row);
});
});
return [...map.values()].sort((a,b)=>a.ts-b.ts);
}

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function groupHourly(rows){
const map=new Map();

rows.forEach(r=>{
const d=new Date(r.ts);
const h=new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime();

const obj=map.get(h)||{ts:h,energy:0,production:0,power:[],pf:[]};

if(r.Consumption_hourly!=null) obj.energy+=r.Consumption_hourly;
if(r.Production_hourly!=null) obj.production+=r.Production_hourly;
if(r.Active_Power!=null) obj.power.push(r.Active_Power);
if(r.Power_Factor!=null) obj.pf.push(r.Power_Factor);

map.set(h,obj);
});

return [...map.values()].map(h=>({
ts:h.ts,
energy:h.energy,
production:h.production,
avgPower:avg(h.power),
avgPF:avg(h.pf)
}));
}

/* ✅ CHARTS */
function charts(hourly){
const x=hourly.map(h=>new Date(h.ts));

Plotly.newPlot("energyChart",[
{
x:x,
y:hourly.map(h=>h.energy),
type:"bar",
name:"Consumption (kWh)",
marker:{color:"#3b82f6"}
},
{
x:x,
y:hourly.map(h=>h.production),
type:"scatter",
name:"Production (Nos)",
yaxis:"y2",
line:{color:"#10b981"}
}
],
{
yaxis:{title:"kWh"},
yaxis2:{overlaying:"y",side:"right"},
legend:{orientation:"h"}
});

/* Power + PF */
Plotly.newPlot("powerChart",[
{
x:x,
y:hourly.map(h=>h.avgPower),
name:"Active Power (kW)",
mode:"lines",
line:{color:"#3b82f6"}
},
{
x:x,
y:hourly.map(h=>h.avgPF),
name:"Power Factor",
mode:"lines",
yaxis:"y2",
line:{color:"#7c3aed"}
}
],
{
yaxis:{title:"kW"},
yaxis2:{overlaying:"y",side:"right",range:[0.8,1]},
shapes:[{
type:"line",
y0:0.95,y1:0.95,
x0:x[0],x1:x.at(-1),
line:{dash:"dot",color:"orange"}
}],
annotations:[{
x:x[Math.floor(x.length/2)],
y:0.95,
text:"PF Target",
showarrow:false
}],
legend:{orientation:"h"}
});
}

/* ✅ PHASE UI */
function phase(rows){

function avgKey(k){
return avg(rows.map(r=>r[k]).filter(v=>v!=null));
}

function bar(val,max,color){
const percent=Math.min((val/max)*100,100);
return `<div class="bar"><div class="fill ${color}" style="width:${percent}%"></div></div>`;
}

function status(v){
return v<3?"<span class='normal'>Normal</span>":"<span class='warning'>Warning</span>";
}

/* R */
const rV=avgKey("R_Voltage");
const rI=avgKey("R_Phase_Current");
const rTHDV=avgKey("THD_VoltageR");
const rTHDI=avgKey("THD_CurrentA");

document.getElementById("phaseR").innerHTML=`
<b>🔴 Phase R</b><br><br>
Avg Voltage ${rV.toFixed(1)} V
${bar(rV,250,"red")}
Current ${rI.toFixed(1)} A
${bar(rI,100,"red")}
THD V: ${rTHDV.toFixed(2)}% ${status(rTHDV)}<br>
THD I: ${rTHDI.toFixed(2)}% ${status(rTHDI)}
`;

/* Y */
const yV=avgKey("Y_Voltage");
const yI=avgKey("Y_Phase_Current");
const yTHDV=avgKey("THD_VoltageY");
const yTHDI=avgKey("THD_CurrentB");

document.getElementById("phaseY").innerHTML=`
<b>🟡 Phase Y</b><br><br>
Avg Voltage ${yV.toFixed(1)} V
${bar(yV,250,"yellow")}
Current ${yI.toFixed(1)} A
${bar(yI,100,"yellow")}
THD V: ${yTHDV.toFixed(2)}% ${status(yTHDV)}<br>
THD I: ${yTHDI.toFixed(2)}% ${status(yTHDI)}
`;

/* B */
const bV=avgKey("B_Voltage");
const bI=avgKey("B_Phase_Current");
const bTHDV=avgKey("THD_VoltageB");
const bTHDI=avgKey("THD_CurrentC");

document.getElementById("phaseB").innerHTML=`
<b>🔵 Phase B</b><br><br>
Avg Voltage ${bV.toFixed(1)} V
${bar(bV,250,"blue")}
Current ${bI.toFixed(1)} A
${bar(bI,100,"blue")}
THD V: ${bTHDV.toFixed(2)}% ${status(bTHDV)}<br>
THD I: ${bTHDI.toFixed(2)}% ${status(bTHDI)}
`;
}

async function generate(){
const date=document.getElementById("dateInput").value;
if(!date){alert("Select date");return;}

const start=new Date(date+"T00:00:00").getTime();
const end=new Date(date+"T23:59:59").getTime();

const data=await fetchData(start,end);
const rows=merge(data);
const hourly=groupHourly(rows);

charts(hourly);
phase(rows);
}
</script>

</body>
</html>
