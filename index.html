<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy Report</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{
  font-family:Segoe UI;
  background:#f5f7fa;
  margin:0;
}

/* Layout spacing */
.container{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px; /* spacing between sections */
}

/* Controls */
.controls{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
}

.kpi-card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.kpi-value{font-size:24px;font-weight:700}

/* Charts */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.chart-card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* Phase full width */
.phase-title{
  font-weight:600;
}

.phase{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
  width:100%;
}

.phase-card{
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.phaseR{background:#fde2e2}
.phaseY{background:#fff6d6}
.phaseB{background:#e2ecff}

/* Bars */
.bar{
  height:6px;
  background:#ddd;
  border-radius:6px;
  margin:6px 0;
}
.fill{height:100%;border-radius:6px}
.red{background:#ef4444}
.yellow{background:#f59e0b}
.blue{background:#3b82f6}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:10px;
}
th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}
th{background:#f3f4f6}

</style>
</head>

<body>
<div class="container">

<!-- Controls -->
<div class="controls">
<input type="date" id="dateInput">
<button onclick="generate()">Generate</button>
</div>

<!-- KPI -->
<div class="kpis">
<div class="kpi-card"><div>Total Energy</div><div id="kpiEnergy" class="kpi-value">-</div></div>
<div class="kpi-card"><div>Avg Power</div><div id="kpiAvgPower" class="kpi-value">-</div></div>
<div class="kpi-card"><div>Max Power</div><div id="kpiMaxPower" class="kpi-value">-</div></div>
<div class="kpi-card"><div>Avg PF</div><div id="kpiAvgPF" class="kpi-value">-</div></div>
<div class="kpi-card"><div>Min PF</div><div id="kpiMinPF" class="kpi-value">-</div></div>
</div>

<!-- Charts -->
<div class="row">

<div class="chart-card">
<h4>Hourly Energy vs Production</h4>
<div id="energyChart"></div>
</div>

<div class="chart-card">
<h4>Power Demand & Power Factor Trend</h4>
<div id="powerChart"></div>
</div>

</div>

<!-- Phase -->
<div class="phase-title">Phase-wise Electrical Analysis</div>

<div class="phase">
<div class="phase-card phaseR" id="phaseR"></div>
<div class="phase-card phaseY" id="phaseY"></div>
<div class="phase-card phaseB" id="phaseB"></div>
</div>

<!-- Table -->
<table>
<thead>
<tr>
<th>Time</th>
<th>Energy</th>
<th>Avg Power</th>
<th>PF</th>
<th>Production</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Active_Power","Power_Factor",
"Consumption_hourly","Production_hourly",
"Today_Consumption",
"R_Voltage","Y_Voltage","B_Voltage",
"R_Phase_Current","Y_Phase_Current","B_Phase_Current",
"THD_VoltageR","THD_VoltageY","THD_VoltageB",
"THD_CurrentA","THD_CurrentB","THD_CurrentC"
];

function num(v){const n=Number(v);return Number.isFinite(n)?n:null;}

async function fetchData(start,end){
const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=50000&agg=NONE`;
const res=await fetch(url,{headers:{"X-Authorization":`Bearer ${TOKEN}`}});
return res.json();
}

function merge(data){
const map=new Map();
Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
const t=p.ts;
const row=map.get(t)||{ts:t};
row[k]=num(p.value);
map.set(t,row);
});
});
return [...map.values()].sort((a,b)=>a.ts-b.ts);
}

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function getLatest(rows,key){
const arr=rows.filter(r=>r[key]!=null).sort((a,b)=>b.ts-a.ts);
return arr.length?arr[0][key]:0;
}

/* KPI */
function generateKPIs(rows){
const power=rows.map(r=>r.Active_Power).filter(v=>v!=null);
const pf=rows.map(r=>r.Power_Factor).filter(v=>v!=null);

const energy=getLatest(rows,"Today_Consumption");

document.getElementById("kpiEnergy").innerText=energy.toFixed(2);
document.getElementById("kpiAvgPower").innerText=avg(power).toFixed(2);
document.getElementById("kpiMaxPower").innerText=Math.max(...power).toFixed(2);
document.getElementById("kpiAvgPF").innerText=avg(pf).toFixed(2);
document.getElementById("kpiMinPF").innerText=Math.min(...pf).toFixed(2);
}

/* Hourly */
function groupHourly(rows){
const map=new Map();

rows.forEach(r=>{
const d=new Date(r.ts);
const h=new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime();

const obj=map.get(h)||{ts:h,energy:0,production:0,power:[],pf:[]};

if(r.Consumption_hourly!=null) obj.energy=r.Consumption_hourly; // FIXED
if(r.Production_hourly!=null) obj.production=r.Production_hourly;
if(r.Active_Power!=null) obj.power.push(r.Active_Power);
if(r.Power_Factor!=null) obj.pf.push(r.Power_Factor);

map.set(h,obj);
});

return [...map.values()].map(h=>({
ts:h.ts,
energy:h.energy,
production:h.production,
avgPower:avg(h.power),
avgPF:avg(h.pf)
}));
}

/* Charts FIXED */
function charts(hourly){
const x=hourly.map(h=>new Date(h.ts));

Plotly.newPlot("energyChart",[
{
x:x,
y:hourly.map(h=>h.energy),
type:"bar",
name:"Consumption (kWh)"
},
{
x:x,
y:hourly.map(h=>h.production),
type:"scatter",
name:"Production",
yaxis:"y2"
}
],
{
yaxis:{title:"kWh"},
yaxis2:{overlaying:"y",side:"right"},
legend:{orientation:"h"}
});

/* Power trend */
Plotly.newPlot("powerChart",[
{
x:x,
y:hourly.map(h=>h.avgPower),
name:"kW",
mode:"lines"
},
{
x:x,
y:hourly.map(h=>h.avgPF),
name:"PF",
mode:"lines",
yaxis:"y2"
}
],
{
yaxis:{title:"kW"},
yaxis2:{overlaying:"y",side:"right",range:[0.8,1]},
shapes:[{
type:"line",
y0:0.95,y1:0.95,
x0:x[0],x1:x.at(-1),
line:{dash:"dot",color:"orange"}
}]
});
}

/* Generate */
async function generate(){
const date=document.getElementById("dateInput").value;
if(!date){alert("Select date");return;}

const start=new Date(date+"T00:00:00").getTime();
const end=new Date(date+"T23:59:59").getTime();

const data=await fetchData(start,end);
const rows=merge(data);
const hourly=groupHourly(rows);

generateKPIs(rows);
charts(hourly);
}
</script>

</body>
</html>
