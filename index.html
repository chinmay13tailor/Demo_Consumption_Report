<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Energy & Production Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{
  font-family:Segoe UI;
  background:#f5f7fa;
  margin:0;
}

.container{padding:20px}

/* Top Controls */
.controls{
  display:flex;
  gap:10px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

button{
  background:#1363df;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.value{font-size:22px;font-weight:bold}

/* Charts */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

/* Phase Cards */
.phase{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
  margin-top:20px;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}
</style>
</head>

<body>
<div class="container">

<!-- Controls -->
<div class="controls">
  <div>
    <label>Select Date</label><br>
    <input type="date" id="dateInput">
  </div>
  <button onclick="generate()">Generate</button>
</div>

<!-- KPI -->
<div class="kpis">
  <div class="card"><div>Total Energy</div><div id="kpiEnergy" class="value">-</div></div>
  <div class="card"><div>Avg Power</div><div id="kpiAvgPower" class="value">-</div></div>
  <div class="card"><div>Max Power</div><div id="kpiMaxPower" class="value">-</div></div>
  <div class="card"><div>Avg PF</div><div id="kpiAvgPF" class="value">-</div></div>
  <div class="card"><div>Min PF</div><div id="kpiMinPF" class="value">-</div></div>
</div>

<!-- Charts -->
<div class="row">
  <div class="card"><div id="energyChart" style="height:300px"></div></div>
  <div class="card"><div id="powerChart" style="height:300px"></div></div>
</div>

<!-- Phase -->
<div class="phase">
  <div class="card" id="phaseR"></div>
  <div class="card" id="phaseY"></div>
  <div class="card" id="phaseB"></div>
</div>

<!-- Table -->
<table>
<thead>
<tr>
<th>Time</th>
<th>Energy</th>
<th>Avg Power</th>
<th>PF</th>
<th>Production</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Active_Power","Power_Factor",
"Consumption_hourly","Production_hourly",
"R_Voltage","Y_Voltage","B_Voltage",
"RY_Voltage","YB_Voltage","BR_Voltage",
"R_Phase_Current","Y_Phase_Current","B_Phase_Current",
"THD_VoltageR","THD_VoltageY","THD_VoltageB",
"THD_CurrentA","THD_CurrentB","THD_CurrentC"
];

function num(v){return Number(v)||0;}

async function fetchData(start,end){
const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=50000&agg=NONE`;

const res=await fetch(url,{
headers:{"X-Authorization":`Bearer ${TOKEN}`}
});

return res.json();
}

function merge(data){
const map=new Map();
Object.entries(data).forEach(([k,arr])=>{
arr.forEach(p=>{
const t=p.ts;
const row=map.get(t)||{ts:t};
row[k]=num(p.value);
map.set(t,row);
});
});
return [...map.values()].sort((a,b)=>a.ts-b.ts);
}

function groupHourly(rows){
const map=new Map();

rows.forEach(r=>{
const d=new Date(r.ts);
const h=new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime();

const obj=map.get(h)||{ts:h,energy:0,production:0,power:[],pf:[]};

obj.energy+=r.Consumption_hourly||0;
obj.production+=r.Production_hourly||0;
if(r.Active_Power) obj.power.push(r.Active_Power);
if(r.Power_Factor) obj.pf.push(r.Power_Factor);

map.set(h,obj);
});

return [...map.values()].map(h=>({
ts:h.ts,
energy:h.energy,
production:h.production,
avgPower:h.power.reduce((a,b)=>a+b,0)/h.power.length||0,
avgPF:h.pf.reduce((a,b)=>a+b,0)/h.pf.length||0
}));
}

function generateKPIs(rows){
const energy=rows.map(r=>r.Consumption_hourly);
const power=rows.map(r=>r.Active_Power);
const pf=rows.map(r=>r.Power_Factor);

document.getElementById("kpiEnergy").innerText=energy.reduce((a,b)=>a+b,0).toFixed(2);
document.getElementById("kpiAvgPower").innerText=(power.reduce((a,b)=>a+b,0)/power.length).toFixed(2);
document.getElementById("kpiMaxPower").innerText=Math.max(...power).toFixed(2);
document.getElementById("kpiAvgPF").innerText=(pf.reduce((a,b)=>a+b,0)/pf.length).toFixed(2);
document.getElementById("kpiMinPF").innerText=Math.min(...pf).toFixed(2);
}

function charts(hourly){
const x=hourly.map(h=>new Date(h.ts));

Plotly.newPlot("energyChart",[
{ x,y:hourly.map(h=>h.energy),type:"bar",name:"Energy"},
{ x,y:hourly.map(h=>h.production),type:"scatter",name:"Production",yaxis:"y2"}
],{yaxis:{title:"kWh"},yaxis2:{overlaying:"y",side:"right"}});

Plotly.newPlot("powerChart",[
{ x,y:hourly.map(h=>h.avgPower),name:"kW"},
{ x,y:hourly.map(h=>h.avgPF),name:"PF",yaxis:"y2"}
],{
yaxis:{title:"kW"},
yaxis2:{overlaying:"y",side:"right",range:[0,1]}
});
}

function table(hourly){
const tb=document.getElementById("tableBody");
tb.innerHTML="";

hourly.forEach(h=>{
const tr=document.createElement("tr");

[
new Date(h.ts).getHours()+":00",
h.energy.toFixed(2),
h.avgPower.toFixed(2),
h.avgPF.toFixed(2),
h.production.toFixed(0)
].forEach(v=>{
const td=document.createElement("td");
td.innerText=v;
tr.appendChild(td);
});

tb.appendChild(tr);
});
}

function phase(rows){
const avg=(key)=>rows.reduce((a,b)=>a+(b[key]||0),0)/rows.length;

document.getElementById("phaseR").innerHTML=`
<b>Phase R</b><br>
Voltage: ${avg("R_Voltage").toFixed(1)} V<br>
Current: ${avg("R_Phase_Current").toFixed(1)} A<br>
THD V: ${avg("THD_VoltageR").toFixed(2)} %<br>
THD I: ${avg("THD_CurrentA").toFixed(2)} %
`;

document.getElementById("phaseY").innerHTML=`
<b>Phase Y</b><br>
Voltage: ${avg("Y_Voltage").toFixed(1)} V<br>
Current: ${avg("Y_Phase_Current").toFixed(1)} A<br>
THD V: ${avg("THD_VoltageY").toFixed(2)} %<br>
THD I: ${avg("THD_CurrentB").toFixed(2)} %
`;

document.getElementById("phaseB").innerHTML=`
<b>Phase B</b><br>
Voltage: ${avg("B_Voltage").toFixed(1)} V<br>
Current: ${avg("B_Phase_Current").toFixed(1)} A<br>
THD V: ${avg("THD_VoltageB").toFixed(2)} %<br>
THD I: ${avg("THD_CurrentC").toFixed(2)} %
`;
}

async function generate(){
const date=document.getElementById("dateInput").value;

const start=new Date(date+"T00:00:00").getTime();
const end=new Date(date+"T23:59:59").getTime();

const data=await fetchData(start,end);
const rows=merge(data);
const hourly=groupHourly(rows);

generateKPIs(rows);
charts(hourly);
table(hourly);
phase(rows);
}
</script>

</body>
</html>
