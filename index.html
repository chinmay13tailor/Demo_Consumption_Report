<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Energy Consumption Report</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{font-family:Segoe UI;background:#eef2f6;margin:0}

/* FILTER */
.filter-wrapper{padding:20px}
.filter-box{
background:#fff;border-radius:16px;padding:18px 25px;
display:flex;justify-content:space-between;align-items:end;
box-shadow:0 8px 20px rgba(0,0,0,0.08)
}
.filter-item label{font-size:12px;color:#64748b;font-weight:600}
.filter-item input{padding:10px;border-radius:8px;border:1px solid #cbd5e1}
button{padding:10px 18px;border:none;border-radius:10px;background:#2D8A6D;color:#fff;font-weight:600;cursor:pointer}

/* KPI */
.page{padding:20px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}
.kpi{background:#fff;padding:16px;border-radius:14px;box-shadow:0 6px 14px rgba(0,0,0,0.05)}
.kpi-title{font-size:13px;color:#64748b}
.kpi-value{font-size:26px;font-weight:700}

/* CHART */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.chart-card{background:#fff;border-radius:16px;padding:20px}

/* PHASE */
.phase-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px}
  .section-title{
  margin-top:25px;
  margin-bottom:10px;
  font-size:16px;
  font-weight:600;
  color:#1f2937;
}

/* TABLE */
.table-card{background:#fff;border-radius:16px;padding:20px;margin-top:20px}
table{width:100%;border-collapse:collapse}
th{background:#f1f5f9;padding:10px}
td{padding:10px;text-align:center;border-bottom:1px solid #e5e7eb}
</style>

</head>

<body>

<div class="filter-wrapper">
<div class="filter-box">
<div class="filter-item">
<label>Select Date</label>
<input type="date" id="date">
</div>
<button onclick="generate()">Generate Report</button>
</div>
</div>

<div class="page">

<div class="kpi-row">
<div class="kpi"><div class="kpi-title">Total Energy Consumption</div><div class="kpi-value" id="totalEnergy">--</div></div>
<div class="kpi"><div class="kpi-title">Average Power Demand</div><div class="kpi-value" id="avgPower">--</div></div>
<div class="kpi"><div class="kpi-title">Maximum Power Demand</div><div class="kpi-value" id="maxPower">--</div></div>
<div class="kpi"><div class="kpi-title">Average Power Factor</div><div class="kpi-value" id="avgPF">--</div></div>
<div class="kpi"><div class="kpi-title">Minimum Power Factor</div><div class="kpi-value" id="minPF">--</div></div>
</div>

<div class="chart-row">
<div class="chart-card"><div id="prodEnergyChart"></div></div>
<div class="chart-card"><div id="trendChart"></div></div>
</div>

<div class="section-title">Phase-wise Electrical Analysis</div>
<div class="phase-row">
<div id="phaseR"></div>
<div id="phaseY"></div>
<div id="phaseB"></div>
</div>

<div class="table-card">
<table id="table"></table>
</div>

</div>

<script>

const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const API="https://plantwiz.pimateck.in/api";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Today_Consumption",
"Active_Power",
"Power_Factor",
"Consumption_hourly",
"Production_hourly",
"R_Voltage","Y_Voltage","B_Voltage",
"R_Phase_Current","Y_Phase_Current","B_Phase_Current",
"THD_VoltageR","THD_VoltageY","THD_VoltageB",
"THD_CurrentA","THD_CurrentB","THD_CurrentC"
];

function num(v){return Number(v)||0}

async function generate(){

const date=document.getElementById("date").value;
if(!date){alert("Select Date");return;}

const startTs=new Date(date+"T00:00:00").getTime();
const endTs=new Date(date+"T23:59:59").getTime();

const res=await fetch(`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${startTs}&endTs=${endTs}&limit=50000`,
{headers:{"X-Authorization":"Bearer "+TOKEN}});

const data=await res.json();

/* MAP */
let map={};
Object.entries(data).forEach(([k,arr])=>{
arr.forEach(p=>{
if(!map[p.ts]) map[p.ts]={ts:p.ts};
map[p.ts][k]=num(p.value);
});
});

let rows=Object.values(map).sort((a,b)=>a.ts-b.ts);

/* SAFE AVG */
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;

/* KPI */
let power=[],pf=[];
rows.forEach(r=>{
if(r.Active_Power) power.push(r.Active_Power);
if(r.Power_Factor) pf.push(r.Power_Factor);
});

/* UNIQUE ENERGY */
let energyMap={}
rows.forEach(r=>{
let h=new Date(r.ts).getHours();
if(r.Consumption_hourly!==undefined) energyMap[h]=r.Consumption_hourly;
});

let energy=Object.values(energyMap).reduce((a,b)=>a+b,0);

totalEnergy.innerText=energy.toFixed(2);
avgPower.innerText=avg(power).toFixed(2);
maxPower.innerText=Math.max(...power).toFixed(2);
avgPF.innerText=avg(pf).toFixed(2);
minPF.innerText=Math.min(...pf).toFixed(2);

/* HOURLY GROUP */
let hourly={};
rows.forEach(r=>{
let h=new Date(r.ts).getHours();
if(!hourly[h]) hourly[h]={prod:0,energy:0,power:[],pf:[]};

if(r.Production_hourly!==undefined) hourly[h].prod=r.Production_hourly;
if(r.Consumption_hourly!==undefined) hourly[h].energy=r.Consumption_hourly;

if(r.Active_Power) hourly[h].power.push(r.Active_Power);
if(r.Power_Factor) hourly[h].pf.push(r.Power_Factor);
});

/* PROD vs ENERGY */
let labels=Object.keys(hourly).map(h=>h+":00");
let prod=Object.values(hourly).map(d=>d.prod);
let en=Object.values(hourly).map(d=>d.energy);

Plotly.newPlot("prodEnergyChart",[
{x:labels,y:prod,type:"bar",name:"Production"},
{x:labels,y:en,type:"line",name:"Energy",yaxis:"y2"}
],{
title:"Hourly Energy vs Production",
yaxis:{title:"Production"},
yaxis2:{overlaying:"y",side:"right",title:"kWh"}
});

/* TREND HOURLY AVG */
let tPower=Object.values(hourly).map(d=>avg(d.power));
let tPF=Object.values(hourly).map(d=>avg(d.pf));

Plotly.newPlot("trendChart",[
{x:labels,y:tPower,name:"Active Power (kW)",mode:"lines+markers"},
{x:labels,y:tPF,name:"Power Factor",yaxis:"y2",mode:"lines+markers"}
],{
title:"Power Demand & Power Factor Trend",
yaxis:{title:"kW"},
yaxis2:{overlaying:"y",side:"right",range:[0.8,1]}
});

/* TABLE */
let html=`<tr>
<th>Time</th>
<th>Energy (kWh)</th>
<th>Avg Demand (kW)</th>
<th>Power Factor</th>
<th>Production</th>
</tr>`;

Object.entries(hourly).forEach(([h,d])=>{
html+=`<tr>
<td>${h}:00</td>
<td>${Number(d.energy || 0).toFixed(2)}</td>
<td>${avg(d.power).toFixed(2)}</td>
<td style="color:${avg(d.pf)<0.9?'red':'green'}">${avg(d.pf).toFixed(2)}</td>
<td>${Number(d.prod || 0).toFixed(0)}</td>
</tr>`;
});

table.innerHTML=html;

/* PHASE UI (FULL) */
let last=rows[rows.length-1];

function phaseCard(title,color,data){
return `
<div style="
  background:${color}15;
  border-radius:16px;
  padding:20px;
  min-height:190px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 6px 12px rgba(0,0,0,0.06)
">

<div>
  <div style="color:${color};font-weight:600;margin-bottom:12px">
    ● ${title}
  </div>

  <div>Avg Line Voltage <b style="float:right">${data.line} V</b></div>

  <div style="margin-top:10px">
    Avg Phase Voltage 
    <b style="float:right">${data.phase} V</b>
  </div>

  <div style="height:6px;background:#ddd;border-radius:6px;margin:6px 0">
    <div style="width:${data.phase/3}%;background:${color};height:100%;border-radius:6px"></div>
  </div>

  <div>Phase Current <b style="float:right">${data.current} A</b></div>

  <div style="height:6px;background:#ddd;border-radius:6px;margin:6px 0">
    <div style="width:${data.current}%;background:${color};height:100%;border-radius:6px"></div>
  </div>
</div>

<div style="margin-top:10px">
  <div>
    THD Voltage 
    <span style="float:right;color:${data.thdV>3?'orange':'green'}">
      ${data.thdV}% ${data.thdV>3?'Warning':'Normal'}
    </span>
  </div>

  <div>
    THD Current 
    <span style="float:right;color:${data.thdC>3?'orange':'green'}">
      ${data.thdC}% ${data.thdC>3?'Warning':'Normal'}
    </span>
  </div>
</div>

</div>
`;
}

phaseR.innerHTML=phaseCard("Phase R","#ef4444",{
line:last.R_Voltage,
phase:last.R_Voltage,
current:last.R_Phase_Current,
thdV:last.THD_VoltageR||0,
thdC:last.THD_CurrentA||0
});

phaseY.innerHTML=phaseCard("Phase Y","#eab308",{
line:last.Y_Voltage,
phase:last.Y_Voltage,
current:last.Y_Phase_Current,
thdV:last.THD_VoltageY||0,
thdC:last.THD_CurrentB||0
});

phaseB.innerHTML=phaseCard("Phase B","#3b82f6",{
line:last.B_Voltage,
phase:last.B_Voltage,
current:last.B_Phase_Current,
thdV:last.THD_VoltageB||0,
thdC:last.THD_CurrentC||0
});

}

document.getElementById("date").value=new Date().toISOString().split("T")[0];

</script>

</body>
</html>
