<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Report</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{
  font-family:Segoe UI;
  background:#eef2f6;
  margin:0;
}

.container{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CONTROLS */
.controls{
  background:#fff;
  padding:12px;
  border-radius:12px;
  display:flex;
  gap:10px;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
}

.kpi{
  background:#fff;
  border-radius:14px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.kpi .title{font-size:13px;color:#666}
.kpi .value{font-size:26px;font-weight:700}
.kpi.blue{border:2px solid #3b82f6}
.kpi.yellow{border:2px solid #f59e0b}
.kpi.red{border:2px solid #ef4444}

/* CHARTS */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* PHASE */
.phase{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.phase-card{
  padding:15px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.phaseR{background:#ffe5e5}
.phaseY{background:#fff7d6}
.phaseB{background:#e5edff}

/* bars */
.bar{height:6px;background:#ddd;border-radius:6px;margin:6px 0}
.fill{height:100%;border-radius:6px}
.red{background:#ef4444}
.yellow{background:#f59e0b}
.blue{background:#3b82f6}

/* TABLE */
.table-card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f3f4f6;
  padding:10px;
  font-size:13px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

/* PF COLOR */
.good{color:green;font-weight:600}
.bad{color:red;font-weight:600}
.warn{color:orange;font-weight:600}

</style>
</head>

<body>
<div class="container">

<!-- Controls -->
<div class="controls">
<input type="date" id="dateInput">
<button onclick="generate()">Generate</button>
</div>

<!-- KPI -->
<div class="kpis">
<div class="kpi"><div class="title">Total Energy Consumption</div><div id="kpiEnergy" class="value">-</div></div>
<div class="kpi"><div class="title">Average Power Demand</div><div id="kpiAvgPower" class="value">-</div></div>
<div class="kpi blue"><div class="title">Maximum Power Demand</div><div id="kpiMaxPower" class="value">-</div></div>
<div class="kpi yellow"><div class="title">Average Power Factor</div><div id="kpiAvgPF" class="value">-</div></div>
<div class="kpi red"><div class="title">Minimum Power Factor</div><div id="kpiMinPF" class="value">-</div></div>
</div>

<!-- Charts -->
<div class="row">
<div class="card">
<h4>Hourly Energy vs Production</h4>
<div id="energyChart"></div>
</div>

<div class="card">
<h4>Power Demand & Power Factor Trend</h4>
<div id="powerChart"></div>
</div>
</div>

<!-- PHASE -->
<h4>Phase-wise Electrical Analysis</h4>

<div class="phase">
<div class="phase-card phaseR" id="phaseR"></div>
<div class="phase-card phaseY" id="phaseY"></div>
<div class="phase-card phaseB" id="phaseB"></div>
</div>

<!-- TABLE -->
<div class="table-card">
<h4>Detailed Hourly Analysis</h4>
<table>
<thead>
<tr>
<th>Time</th>
<th>Energy (kWh)</th>
<th>Avg Demand (kW)</th>
<th>Power Factor</th>
<th>Production</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const TOKEN=new URLSearchParams(location.search).get("token");

const KEYS=[
"Active_Power","Power_Factor",
"Consumption_hourly","Production_hourly",
"Today_Consumption",
"R_Voltage","Y_Voltage","B_Voltage",
"R_Phase_Current","Y_Phase_Current","B_Phase_Current",
"THD_VoltageR","THD_VoltageY","THD_VoltageB",
"THD_CurrentA","THD_CurrentB","THD_CurrentC"
];

function num(v){const n=Number(v);return Number.isFinite(n)?n:null;}

async function fetchData(start,end){
const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=${KEYS.join(",")}&startTs=${start}&endTs=${end}&limit=50000&agg=NONE`;
const res=await fetch(url,{headers:{"X-Authorization":`Bearer ${TOKEN}`}});
return res.json();
}

function merge(data){
const map=new Map();
Object.entries(data).forEach(([k,arr])=>{
(arr||[]).forEach(p=>{
const t=p.ts;
const row=map.get(t)||{ts:t};
row[k]=num(p.value);
map.set(t,row);
});
});
return [...map.values()].sort((a,b)=>a.ts-b.ts);
}

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function getLatest(rows,key){
const arr=rows.filter(r=>r[key]!=null).sort((a,b)=>b.ts-a.ts);
return arr.length?arr[0][key]:0;
}

function groupHourly(rows){
const map=new Map();
rows.forEach(r=>{
const d=new Date(r.ts);
const h=new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime();
const obj=map.get(h)||{ts:h,energy:0,production:0,power:[],pf:[]};

if(r.Consumption_hourly!=null) obj.energy=r.Consumption_hourly;
if(r.Production_hourly!=null) obj.production=r.Production_hourly;
if(r.Active_Power!=null) obj.power.push(r.Active_Power);
if(r.Power_Factor!=null) obj.pf.push(r.Power_Factor);

map.set(h,obj);
});

return [...map.values()].map(h=>({
ts:h.ts,
energy:h.energy,
production:h.production,
avgPower:avg(h.power),
avgPF:avg(h.pf)
}));
}

function charts(hourly){
const x=hourly.map(h=>new Date(h.ts));

Plotly.newPlot("energyChart",[
{ x,y:hourly.map(h=>h.energy),type:"bar",name:"Consumption (kWh)"},
{ x,y:hourly.map(h=>h.production),type:"scatter",name:"Production",yaxis:"y2"}
]);

Plotly.newPlot("powerChart",[
{ x,y:hourly.map(h=>h.avgPower),name:"kW",mode:"lines"},
{ x,y:hourly.map(h=>h.avgPF),name:"PF",mode:"lines",yaxis:"y2"}
],
{
yaxis:{title:"kW"},
yaxis2:{overlaying:"y",side:"right",range:[0.8,1]},
shapes:[{type:"line",y0:0.95,y1:0.95,x0:x[0],x1:x.at(-1),line:{dash:"dot"}}]
});
}

function phase(rows){
function avgKey(k){return avg(rows.map(r=>r[k]).filter(v=>v!=null));}
function bar(v,max,color){
return `<div class="bar"><div class="fill ${color}" style="width:${Math.min(v/max*100,100)}%"></div></div>`;
}

document.getElementById("phaseR").innerHTML=`🔴 Phase R<br>
Voltage ${avgKey("R_Voltage").toFixed(1)} V ${bar(avgKey("R_Voltage"),250,"red")}
Current ${avgKey("R_Phase_Current").toFixed(1)} A ${bar(avgKey("R_Phase_Current"),100,"red")}
`;

document.getElementById("phaseY").innerHTML=`🟡 Phase Y<br>
Voltage ${avgKey("Y_Voltage").toFixed(1)} V ${bar(avgKey("Y_Voltage"),250,"yellow")}
Current ${avgKey("Y_Phase_Current").toFixed(1)} A ${bar(avgKey("Y_Phase_Current"),100,"yellow")}
`;

document.getElementById("phaseB").innerHTML=`🔵 Phase B<br>
Voltage ${avgKey("B_Voltage").toFixed(1)} V ${bar(avgKey("B_Voltage"),250,"blue")}
Current ${avgKey("B_Phase_Current").toFixed(1)} A ${bar(avgKey("B_Phase_Current"),100,"blue")}
`;
}

function table(hourly){
const tb=document.getElementById("tableBody");
tb.innerHTML="";
hourly.forEach(h=>{
let pfClass=h.avgPF>0.95?"good":h.avgPF<0.9?"bad":"warn";

const tr=document.createElement("tr");
[
new Date(h.ts).getHours()+":00",
h.energy.toFixed(2),
h.avgPower.toFixed(2),
`<span class="${pfClass}">${h.avgPF.toFixed(2)}</span>`,
h.production.toFixed(0)
].forEach(v=>{
const td=document.createElement("td");
td.innerHTML=v;
tr.appendChild(td);
});
tb.appendChild(tr);
});
}

async function generate(){
const date=document.getElementById("dateInput").value;
if(!date){alert("Select date");return;}

const start=new Date(date+"T00:00:00").getTime();
const end=new Date(date+"T23:59:59").getTime();

const data=await fetchData(start,end);
const rows=merge(data);
const hourly=groupHourly(rows);

document.getElementById("kpiEnergy").innerText=getLatest(rows,"Today_Consumption").toFixed(2);
document.getElementById("kpiAvgPower").innerText=avg(rows.map(r=>r.Active_Power).filter(v=>v!=null)).toFixed(2);
document.getElementById("kpiMaxPower").innerText=Math.max(...rows.map(r=>r.Active_Power||0)).toFixed(2);
document.getElementById("kpiAvgPF").innerText=avg(rows.map(r=>r.Power_Factor).filter(v=>v!=null)).toFixed(2);
document.getElementById("kpiMinPF").innerText=Math.min(...rows.map(r=>r.Power_Factor||1)).toFixed(2);

charts(hourly);
phase(rows);
table(hourly);
}
</script>

</body>
</html>
