<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Report</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{
  font-family:Segoe UI;
  background:#eef2f6;
  margin:0;
}

.container{
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* KPI SAME (UNCHANGED) */
.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:16px;
}

.kpi-card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  border:1px solid #e5e7eb;
}

.kpi-header{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#6b7280;
}

.kpi-value{
  font-size:28px;
  font-weight:700;
}

/* CHART */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.chart-card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

#energyChart,#powerChart{
  height:320px;
}

/* PHASE */
.phase{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:16px;
}

.phase-card{
  padding:16px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

/* TABLE */
.table-card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f3f4f6;
  padding:10px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.good{color:green}
.bad{color:red}
.warn{color:orange}
</style>
</head>

<body>

<div class="container">

<input type="date" id="dateInput">
<button onclick="generate()">Generate</button>

<!-- KPI -->
<div class="kpis">
<div class="kpi-card">
<div class="kpi-header">Total Energy</div>
<div class="kpi-value" id="kpiEnergy">0</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Avg Power</div>
<div class="kpi-value" id="kpiAvgPower">0</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Max Power</div>
<div class="kpi-value" id="kpiMaxPower">0</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Avg PF</div>
<div class="kpi-value" id="kpiAvgPF">0</div>
</div>

<div class="kpi-card">
<div class="kpi-header">Min PF</div>
<div class="kpi-value" id="kpiMinPF">0</div>
</div>
</div>

<!-- CHART -->
<div class="row">
<div class="chart-card"><div id="energyChart"></div></div>
<div class="chart-card"><div id="powerChart"></div></div>
</div>

<!-- PHASE -->
<div class="phase">
<div class="phase-card" id="phaseR"></div>
<div class="phase-card" id="phaseY"></div>
<div class="phase-card" id="phaseB"></div>
</div>

<!-- TABLE -->
<div class="table-card">
<table>
<thead>
<tr>
<th>Time</th><th>Energy</th><th>Power</th><th>PF</th><th>Prod</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
const API="https://plantwiz.pimateck.in/api";
const DEVICE_ID="991cf500-661a-11f0-90f1-775fee303094";
const TOKEN=new URLSearchParams(location.search).get("token");

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

async function generate(){

const date=document.getElementById("dateInput").value;
if(!date)return;

const start=new Date(date+"T00:00:00").getTime();
const end=new Date(date+"T23:59:59").getTime();

const url=`${API}/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=Active_Power,Power_Factor,Consumption_hourly,Production_hourly,Today_Consumption&startTs=${start}&endTs=${end}&limit=50000`;

const res=await fetch(url,{headers:{"X-Authorization":`Bearer ${TOKEN}`}});
const data=await res.json();

const rows=[];
Object.values(data).forEach(arr=>{
arr.forEach(p=>rows.push({ts:p.ts,val:Number(p.value)}));
});

if(rows.length===0){
alert("No data");
return;
}

/* KPI */
document.getElementById("kpiEnergy").innerText="OK";

/* DEMO CHART */
Plotly.newPlot("energyChart",[{
x:[1,2,3],y:[10,20,30],type:"bar"
}]);

Plotly.newPlot("powerChart",[{
x:[1,2,3],y:[5,10,15]
}]);

/* PHASE */
document.getElementById("phaseR").innerText="Phase R Data";
document.getElementById("phaseY").innerText="Phase Y Data";
document.getElementById("phaseB").innerText="Phase B Data";

/* TABLE */
const tb=document.getElementById("tableBody");
tb.innerHTML="<tr><td>00:00</td><td>10</td><td>5</td><td>0.9</td><td>100</td></tr>";
}
</script>

</body>
</html>
